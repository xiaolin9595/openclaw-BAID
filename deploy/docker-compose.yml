services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentid
      POSTGRES_USER: agentid
      POSTGRES_PASSWORD: agentid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentid -d agentid"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  agentid-service:
    restart: unless-stopped
    build:
      context: ../agentid-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgres://agentid:agentid@postgres:5432/agentid
      ISSUER_PRIVATE_KEY_PATH: /run/secrets/issuer-ed25519.pem
    secrets:
      - issuer-ed25519.pem
    command: ["/bin/sh", "-c", "node dist/db/migrate.js && node dist/server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health/ready').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_AGENTID_API_URL: https://agentid-baid.site
    depends_on:
      agentid-service:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./certbot:/certs:ro

secrets:
  issuer-ed25519.pem:
    file: ./secrets/issuer-ed25519.pem

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
